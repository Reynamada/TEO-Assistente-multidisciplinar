# ================================================================
# NGINX — Reverse Proxy para o TEO (Produção)
# Gerencia HTTPS com Let's Encrypt + roteamento para os serviços
# ================================================================

# Redireciona todo HTTP → HTTPS
server {
    listen 80;
    server_name ${DOMAIN};

    # Desafio ACME do Let's Encrypt (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Principal ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN};

    # Certificados Let's Encrypt (gerados pelo certbot)
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # Configurações SSL modernas (A+ no SSL Labs)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Limite de upload (para futuras features de upload de documentos)
    client_max_body_size 20M;

    # ── Dashboard Streamlit (rota principal) ─────────────────────
    location / {
        proxy_pass http://frontend:8501;
        proxy_http_version 1.1;

        # WebSocket (necessário para o Streamlit funcionar)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # ── FastAPI Backend (prefixo /api) ───────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout generoso para geração de PDF e chamadas LLM
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Webhook WhatsApp (Twilio envia POST aqui) ────────────────
    location /api/v1/whatsapp/webhook {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Bloqueia IPs que não sejam do Twilio (segurança)
        # Faixa de IPs do Twilio: https://www.twilio.com/docs/iam/ip-addresses
        # allow 54.172.60.0/23;
        # allow 54.244.51.0/24;
        # deny all;
        # (descomente as linhas acima em produção para máxima segurança)
    }

    # ── Swagger/Docs da API (apenas em desenvolvimento) ──────────
    # Remova este bloco em produção se não quiser expor a API docs
    location /docs {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Protege o swagger com Basic Auth básico (opcional)
        # auth_basic "TEO API Docs";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }

    location /redoc {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Health check público ──────────────────────────────────────
    location /health {
        proxy_pass http://backend:8000;
        access_log off;
    }

    # Bloqueia acesso direto ao pgAdmin pela internet
    location /pgadmin {
        return 403 "Acesso negado. Use VPN ou acesso interno.";
    }
}
