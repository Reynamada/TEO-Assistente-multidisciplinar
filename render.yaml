services:
  - type: web
    name: teo-backend
    env: docker
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WEBHOOK_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
